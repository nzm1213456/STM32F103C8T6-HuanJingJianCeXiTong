<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>环境监测设备控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto">
        <!-- 头部信息 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800">HuanJingJianCe 环境监测控制面板</h1>
                <div class="flex items-center gap-2">
                    <span id="statusDot" class="w-3 h-3 rounded-full bg-gray-400"></span>
                    <span id="statusText" class="text-gray-600">加载中...</span>
                </div>
            </div>
        </div>

        <!-- 数值型属性卡片区域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <!-- 温度卡片 -->
            <div class="property-card bg-white rounded-xl shadow p-6 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300"
                 data-identifier="WenDu" data-name="温度" data-unit="℃" data-color="#3b82f6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center">
                        <i class="fa fa-thermometer-half text-blue-500 text-xl"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700">温度</h3>
                </div>
                <div class="text-3xl font-bold text-gray-800">
                    <span id="WenDu">0</span>
                    <span class="text-lg font-normal text-gray-500">℃</span>
                </div>
                <p class="text-sm text-gray-400 mt-2">点击查看历史数据</p>
            </div>

            <!-- 湿度卡片 -->
            <div class="property-card bg-white rounded-xl shadow p-6 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300"
                 data-identifier="ShiDu" data-name="湿度" data-unit="%RH" data-color="#22c55e">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
                        <i class="fa fa-tint text-green-500 text-xl"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700">湿度</h3>
                </div>
                <div class="text-3xl font-bold text-gray-800">
                    <span id="ShiDu">0</span>
                    <span class="text-lg font-normal text-gray-500">%RH</span>
                </div>
                <p class="text-sm text-gray-400 mt-2">点击查看历史数据</p>
            </div>

            <!-- 空气质量卡片 -->
            <div class="property-card bg-white rounded-xl shadow p-6 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300"
                 data-identifier="KongQiZhiLiang" data-name="空气质量" data-unit="ppm" data-color="#f97316">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center">
                        <i class="fa fa-wind text-orange-500 text-xl"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700">空气质量</h3>
                </div>
                <div class="text-3xl font-bold text-gray-800">
                    <span id="KongQiZhiLiang">0.0</span>
                    <span class="text-lg font-normal text-gray-500">ppm</span>
                </div>
                <p class="text-sm text-gray-400 mt-2">点击查看历史数据</p>
            </div>

            <!-- 烟雾卡片 -->
            <div class="property-card bg-white rounded-xl shadow p-6 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300"
                 data-identifier="YanWu" data-name="烟雾" data-unit="ppm" data-color="#ef4444">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center">
                        <i class="fa fa-exclamation-triangle text-red-500 text-xl"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-700">烟雾</h3>
                </div>
                <div class="text-3xl font-bold text-gray-800">
                    <span id="YanWu">0.0</span>
                    <span class="text-lg font-normal text-gray-500">ppm</span>
                </div>
                <p class="text-sm text-gray-400 mt-2">点击查看历史数据</p>
            </div>
        </div>

        <!-- 开关控制区域 -->
        <!-- 修改：添加id和模式提示，自动模式下置灰禁用控制按钮 -->
        <div class="bg-white rounded-xl shadow p-6 mb-6" id="controlSection">
            <h3 class="text-lg font-semibold text-gray-700 mb-4">设备开关控制</h3>
            <p id="modeControlHint" class="text-sm text-amber-500 mb-3 text-center hidden"></p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- 风扇控制 -->
                <div class="border rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-refresh text-blue-500"></i>
                            <span class="font-medium text-gray-700">风扇</span>
                        </div>
                        <span id="FengShanStatus" class="text-sm text-gray-500">-</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="switch-open flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="FengShan" data-value="true">
                            打开
                        </button>
                        <button class="switch-close flex-1 bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="FengShan" data-value="false">
                            关闭
                        </button>
                    </div>
                </div>

                <!-- 继电器控制 -->
                <div class="border rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-power-off text-purple-500"></i>
                            <span class="font-medium text-gray-700">继电器</span>
                        </div>
                        <span id="JiDianQiStatus" class="text-sm text-gray-500">-</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="switch-open flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="JiDianQi" data-value="true">
                            打开
                        </button>
                        <button class="switch-close flex-1 bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="JiDianQi" data-value="false">
                            关闭
                        </button>
                    </div>
                </div>

                <!-- 空调制冷控制 -->
                <div class="border rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-snowflake-o text-cyan-500"></i>
                            <span class="font-medium text-gray-700">空调制冷</span>
                        </div>
                        <span id="KongTiaoZhiLengStatus" class="text-sm text-gray-500">-</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="switch-open flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="KongTiaoZhiLeng" data-value="true">
                            打开
                        </button>
                        <button class="switch-close flex-1 bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="KongTiaoZhiLeng" data-value="false">
                            关闭
                        </button>
                    </div>
                </div>

                <!-- 空调制热控制 -->
                <div class="border rounded-lg p-4">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-fire text-red-500"></i>
                            <span class="font-medium text-gray-700">空调制热</span>
                        </div>
                        <span id="KongTiaoZhiReStatus" class="text-sm text-gray-500">-</span>
                    </div>
                    <div class="flex gap-2">
                        <button class="switch-open flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="KongTiaoZhiRe" data-value="true">
                            打开
                        </button>
                        <button class="switch-close flex-1 bg-red-500 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition-colors" data-identifier="KongTiaoZhiRe" data-value="false">
                            关闭
                        </button>
                    </div>
                </div>
            </div>
            <p id="controlTip" class="text-sm text-green-500 mt-4 text-center"></p>
        </div>

        <!-- 模式切换区域：新增MoShi属性下发，支持网页切换自动/手动模式 -->
        <div class="bg-white rounded-xl shadow p-6 mb-6">
            <h3 class="text-lg font-semibold text-gray-700 mb-4">工作模式切换</h3>
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <i class="fa fa-cog text-indigo-500 text-xl"></i>
                    <div>
                        <p class="font-medium text-gray-700">当前模式</p>
                        <p id="MoShiStatus" class="text-sm text-gray-400">未知</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <!-- 新增：下发MoShi="ZD"切换自动模式 -->
                    <button class="mode-switch bg-indigo-500 hover:bg-indigo-600 text-white py-2 px-6 rounded-lg transition-colors" data-value="ZD">
                        自动模式
                    </button>
                    <!-- 新增：下发MoShi="SD"切换手动模式 -->
                    <button class="mode-switch bg-amber-500 hover:bg-amber-600 text-white py-2 px-6 rounded-lg transition-colors" data-value="SD">
                        手动模式
                    </button>
                </div>
            </div>
            <p id="modeTip" class="text-sm text-green-500 mt-4 text-center"></p>
        </div>

        <!-- 修复：原文本写"30秒"与实际setInterval(10000ms=10秒)不一致，修正为10秒 -->
        <p class="text-center text-xs text-gray-400">数据每10秒自动刷新</p>
    </div>

    <!-- 历史数据模态框 -->
    <div id="historyModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-[90%] md:w-[80%] max-w-[800px] max-h-[90vh] overflow-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">历史数据</h3>
                <button id="closeModal" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <div id="historyChart" style="width: 100%; height: 400px;"></div>
            </div>
        </div>
    </div>

    <script>
        // 配置信息
        const config = {
            token: "version=2018-10-31&res=products%2F6oH7Na9MOg%2Fdevices%2FHuanJingJianCe&et=2098274935&method=md5&sign=Z0%2FFNPoXVCcGvgqUZ2tf3Q%3D%3D",
            productId: "6oH7Na9MOg",
            deviceName: "HuanJingJianCe",
            api: {
                deviceDetail: "https://iot-api.heclouds.com/device/detail",
                getProperty: "https://iot-api.heclouds.com/thingmodel/query-device-property",
                setProperty: "https://iot-api.heclouds.com/thingmodel/set-device-property",
                getHistory: "https://iot-api.heclouds.com/thingmodel/query-device-property-history"
            }
        };

        let chartInstance = null;
        let currentMode = null; // 新增：记录当前工作模式，自动模式下禁用控制按钮

        // 修复：统一解析OneNET返回的bool值，兼容布尔值/字符串"true"/"false"/整数1/0
        function parseBool(value) {
            if (value === true || value === "true" || value === 1 || value === "1") return true;
            if (value === false || value === "false" || value === 0 || value === "0") return false;
            return null; // 修复：属性未上报或类型异常时返回null，避免误判
        }

        // 获取设备在线状态
        async function getDeviceStatus() {
            try {
                const res = await fetch(`${config.api.deviceDetail}?product_id=${config.productId}&device_name=${config.deviceName}`, {
                    headers: { "authorization": config.token }
                });
                const data = await res.json();
                if (data.code === 0) {
                    const status = data.data.status;
                    const dot = document.getElementById("statusDot");
                    const text = document.getElementById("statusText");
                    if (status === 1) {
                        dot.className = "w-3 h-3 rounded-full bg-green-500";
                        text.textContent = "在线";
                        text.className = "text-green-600";
                    } else {
                        dot.className = "w-3 h-3 rounded-full bg-gray-400";
                        text.textContent = "离线";
                        text.className = "text-gray-600";
                    }
                }
            } catch (err) {
                console.error("获取设备状态失败：", err);
            }
        }

        // 获取设备当前属性
        async function getDeviceProperties() {
            try {
                const res = await fetch(`${config.api.getProperty}?product_id=${config.productId}&device_name=${config.deviceName}`, {
                    headers: { "authorization": config.token }
                });
                const data = await res.json();
                if (data.code !== 0) {
                    console.error("获取属性失败：", data.msg);
                    return;
                }
                const list = data.data;

                // 解析数值型属性
                const wendu = list.find(i => i.identifier === "WenDu")?.value || 0;
                const shidu = list.find(i => i.identifier === "ShiDu")?.value || 0;
                const kongqi = list.find(i => i.identifier === "KongQiZhiLiang")?.value || 0;
                const yanwu = list.find(i => i.identifier === "YanWu")?.value || 0;

                // 解析开关型属性
                const fengshan = list.find(i => i.identifier === "FengShan")?.value;
                const jidianqi = list.find(i => i.identifier === "JiDianQi")?.value;
                const zhileng = list.find(i => i.identifier === "KongTiaoZhiLeng")?.value;
                const zhire = list.find(i => i.identifier === "KongTiaoZhiRe")?.value;
                // 新增：解析MoShi模式属性，ZD=自动模式 SD=手动模式
                const moshi = list.find(i => i.identifier === "MoShi")?.value;

                // 更新数值型属性显示
                document.getElementById("WenDu").textContent = parseInt(wendu);
                document.getElementById("ShiDu").textContent = parseInt(shidu);
                document.getElementById("KongQiZhiLiang").textContent = parseFloat(kongqi).toFixed(1);
                document.getElementById("YanWu").textContent = parseFloat(yanwu).toFixed(1);

                // 修复：使用parseBool统一转换bool值，避免字符串"false"被误判为true
                const switches = [
                    { id: "FengShanStatus", value: fengshan },
                    { id: "JiDianQiStatus", value: jidianqi },
                    { id: "KongTiaoZhiLengStatus", value: zhileng },
                    { id: "KongTiaoZhiReStatus", value: zhire }
                ];
                switches.forEach(sw => {
                    const el = document.getElementById(sw.id);
                    const boolVal = parseBool(sw.value);
                    if (boolVal === true) {
                        el.textContent = "开启";
                        el.className = "text-sm font-medium text-green-600";
                    } else if (boolVal === false) {
                        el.textContent = "关闭";
                        el.className = "text-sm font-medium text-red-500";
                    } else {
                        el.textContent = "未知";
                        el.className = "text-sm text-gray-400";
                    }
                });

                // 新增：更新MoShi模式状态显示
                const moshiEl = document.getElementById("MoShiStatus");
                if (moshi === "ZD") {
                    moshiEl.textContent = "自动模式";
                    moshiEl.className = "text-sm font-medium text-indigo-600";
                } else if (moshi === "SD") {
                    moshiEl.textContent = "手动模式";
                    moshiEl.className = "text-sm font-medium text-amber-600";
                } else {
                    moshiEl.textContent = "未知";
                    moshiEl.className = "text-sm text-gray-400";
                }
                // 新增：根据模式更新控制按钮可用状态（自动模式禁用，手动模式启用）
                updateControlState(moshi);
            } catch (err) {
                console.error("获取属性失败：", err);
            }
        }

        // 新增：根据工作模式更新控制按钮可用状态
        // 自动模式(ZD)：禁用并置灰所有控制按钮，显示提示文字
        // 手动模式(SD)：启用所有控制按钮，隐藏提示
        function updateControlState(mode) {
            currentMode = mode;
            const buttons = document.querySelectorAll(".switch-open, .switch-close");
            const hint = document.getElementById("modeControlHint");
            const section = document.getElementById("controlSection");

            if (mode === "ZD") {
                // 自动模式：禁用按钮，置灰整个控制区，显示提示
                buttons.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add("opacity-50", "cursor-not-allowed");
                });
                section.classList.add("opacity-60");
                hint.textContent = "当前为自动模式，设备由传感器阈值自动控制。如需手动操作，请先切换到手动模式。";
                hint.classList.remove("hidden");
            } else if (mode === "SD") {
                // 手动模式：启用按钮，恢复正常外观
                buttons.forEach(btn => {
                    btn.disabled = false;
                    btn.classList.remove("opacity-50", "cursor-not-allowed");
                });
                section.classList.remove("opacity-60");
                hint.classList.add("hidden");
            }
        }

        // 控制开关
        function controlSwitch(identifier, value) {
            const tipEl = document.getElementById("controlTip");

            // 新增：自动模式下禁止手动控制，提示用户先切换模式
            if (currentMode === "ZD") {
                tipEl.textContent = "当前为自动模式，请先切换到手动模式后再控制设备";
                tipEl.className = "text-sm text-amber-500 mt-4 text-center";
                setTimeout(() => { tipEl.textContent = ""; }, 3000);
                return;
            }

            // 修复：原代码立即显示"已执行"误导用户，改为显示"发送中"等待API响应
            tipEl.textContent = "正在发送控制指令...";
            tipEl.className = "text-sm text-blue-500 mt-4 text-center";

            // 后台发送控制指令
            const boolValue = value === "true";
            fetch(config.api.setProperty, {
                method: "POST",
                headers: {
                    "authorization": config.token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product_id: config.productId,
                    device_name: config.deviceName,
                    params: { [identifier]: boolValue }
                })
            })
            .then(res => res.json())
            .then((data) => {
                // 修复：检查API返回码，失败时显示错误信息
                if (data.code !== 0) {
                    console.error("控制指令发送失败：", data.msg);
                    tipEl.textContent = "发送失败：" + (data.msg || "未知错误");
                    tipEl.className = "text-sm text-red-500 mt-4 text-center";
                    setTimeout(() => { tipEl.textContent = ""; }, 5000);  // 修复：延长错误提示到5秒，让用户看清超时原因
                    return;
                }
                // 修复：成功后再显示"已执行"，而非提前显示（原代码在请求前就显示"已执行"）
                tipEl.textContent = "指令已执行";
                tipEl.className = "text-sm text-green-500 mt-4 text-center";
                setTimeout(() => { tipEl.textContent = ""; }, 2000);
                // 修复：延迟3秒后再刷新数据，给设备处理MQTT指令的时间（原立即刷新读到旧状态）
                setTimeout(() => {
                    getDeviceProperties();
                }, 3000);
            })
            .catch(err => {
                console.error("控制指令发送失败：", err);
                tipEl.textContent = "网络错误，请检查网络连接";
                tipEl.className = "text-sm text-red-500 mt-4 text-center";
                setTimeout(() => { tipEl.textContent = ""; }, 3000);
            });
        }

        // 新增：切换工作模式，下发MoShi属性（String类型，值为"ZD"或"SD"）
        // OneNET set-device-property API 格式: {"params":{"MoShi":"ZD"}}
        function switchMode(value) {
            const tipEl = document.getElementById("modeTip");
            tipEl.textContent = "正在切换模式...";
            tipEl.className = "text-sm text-blue-500 mt-4 text-center";

            fetch(config.api.setProperty, {
                method: "POST",
                headers: {
                    "authorization": config.token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product_id: config.productId,
                    device_name: config.deviceName,
                    params: { "MoShi": value }  // 新增：MoShi为String类型，直接传字符串值
                })
            })
            .then(res => res.json())
            .then((data) => {
                if (data.code !== 0) {
                    console.error("模式切换失败：", data.msg);
                    tipEl.textContent = "切换失败：" + (data.msg || "未知错误");
                    tipEl.className = "text-sm text-red-500 mt-4 text-center";
                    setTimeout(() => { tipEl.textContent = ""; }, 3000);
                    return;
                }
                tipEl.textContent = value === "ZD" ? "已切换到自动模式" : "已切换到手动模式";
                tipEl.className = "text-sm text-green-500 mt-4 text-center";
                setTimeout(() => { tipEl.textContent = ""; }, 2000);
                // 新增：模式切换成功后立即更新控制按钮状态，无需等3秒后刷新
                updateControlState(value);
                // 新增：延迟3秒后刷新数据，给设备处理MQTT指令的时间
                setTimeout(() => {
                    getDeviceProperties();
                }, 3000);
            })
            .catch(err => {
                console.error("模式切换失败：", err);
                tipEl.textContent = "网络错误，请检查网络连接";
                tipEl.className = "text-sm text-red-500 mt-4 text-center";
                setTimeout(() => { tipEl.textContent = ""; }, 3000);
            });
        }

        // 加载历史数据
        async function loadHistoryData(identifier, name, unit, color) {
            const modal = document.getElementById("historyModal");
            const title = document.getElementById("modalTitle");
            title.textContent = `${name}历史数据`;
            modal.classList.remove("hidden");

            // 初始化图表
            if (!chartInstance) {
                chartInstance = echarts.init(document.getElementById("historyChart"));
            }
            chartInstance.showLoading();

            try {
                // 查询最近24小时的历史数据
                const endTime = Date.now();
                const startTime = endTime - 24 * 60 * 60 * 1000;

                const res = await fetch(`${config.api.getHistory}?product_id=${config.productId}&device_name=${config.deviceName}&identifier=${identifier}&start_time=${startTime}&end_time=${endTime}&limit=100`, {
                    headers: { "authorization": config.token }
                });
                const data = await res.json();
                if (data.code !== 0) {
                    alert("获取历史数据失败：" + data.msg);
                    chartInstance.hideLoading();
                    return;
                }

                const list = data.data.list || [];
                // 反转数据，按时间正序排列
                list.reverse();

                // 处理数据格式
                const times = list.map(item => {
                    const date = new Date(parseInt(item.time));
                    return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                });
                const values = list.map(item => {
                    const val = item.value;
                    return isNaN(val) ? val : parseFloat(val);
                });

                // 渲染图表
                const option = {
                    tooltip: {
                        trigger: 'axis'
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: times,
                        axisLabel: {
                            rotate: 30
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: unit
                    },
                    series: [
                        {
                            name: name,
                            type: 'line',
                            data: values,
                            smooth: true,
                            itemStyle: {
                                color: color
                            },
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: color + '80' },
                                    { offset: 1, color: color + '10' }
                                ])
                            }
                        }
                    ]
                };
                chartInstance.setOption(option, true);
                chartInstance.hideLoading();

                // 窗口大小变化时自适应图表
                window.addEventListener('resize', () => {
                    chartInstance.resize();
                });
            } catch (err) {
                console.error("获取历史数据失败：", err);
                alert("获取历史数据失败，请稍后重试");
                chartInstance.hideLoading();
            }
        }

        // 页面初始化
        window.onload = () => {
            // 初始加载数据
            getDeviceStatus();
            getDeviceProperties();

            // 定时刷新数据，每10秒一次
            setInterval(() => {
                getDeviceStatus();
                getDeviceProperties();
            }, 10000);

            // 绑定开关控制按钮事件
            document.querySelectorAll(".switch-open, .switch-close").forEach(btn => {
                btn.addEventListener("click", () => {
                    const identifier = btn.dataset.identifier;
                    const value = btn.dataset.value;
                    controlSwitch(identifier, value);
                });
            });

            // 新增：绑定模式切换按钮事件，下发MoShi属性
            document.querySelectorAll(".mode-switch").forEach(btn => {
                btn.addEventListener("click", () => {
                    const value = btn.dataset.value;
                    switchMode(value);
                });
            });

            // 绑定属性卡片点击事件
            document.querySelectorAll(".property-card").forEach(card => {
                card.addEventListener("click", () => {
                    const identifier = card.dataset.identifier;
                    const name = card.dataset.name;
                    const unit = card.dataset.unit;
                    const color = card.dataset.color;
                    loadHistoryData(identifier, name, unit, color);
                });
            });

            // 绑定模态框关闭事件
            document.getElementById("closeModal").addEventListener("click", () => {
                document.getElementById("historyModal").classList.add("hidden");
            });
            document.getElementById("historyModal").addEventListener("click", (e) => {
                if (e.target === document.getElementById("historyModal")) {
                    document.getElementById("historyModal").classList.add("hidden");
                }
            });
        };
    </script>
</body>
</html>
